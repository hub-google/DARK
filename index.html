<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK - AlphaZero Chinese Dark Chess</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>DARK <span class="badge">AI</span></h1>
            <p class="subtitle">AlphaZero 深度學習暗棋</p>
        </header>

        <main>
            <div id="game-container">
                <div id="board-info">
                    <div class="player-info red active">
                        <span class="dot"></span> 紅方 (你)
                    </div>
                    <div class="vs">VS</div>
                    <div class="player-info black">
                        黑方 (AI) <span class="dot"></span>
                    </div>
                </div>

                <div id="board" class="glass-panel">
                    <!-- 4x8 Grid will be generated by JS -->
                </div>

                <div id="controls">
                    <button id="reset-btn" class="glass-btn">重新開局</button>
                    <button id="undo-btn" class="glass-btn">悔棋</button>
                </div>
            </div>

            <aside id="side-panel">
                <div class="stat-card glass-panel">
                    <h3>AI 思考狀態</h3>
                    <div id="ai-status" class="status-msg">等待開局...</div>
                    <div class="progress-bar-container">
                        <div id="ai-progress" class="progress-bar"></div>
                    </div>
                </div>
                
                <div class="log-card glass-panel">
                    <h3>對弈日誌</h3>
                    <div id="game-log"></div>
                </div>
            </aside>
        </main>

        <footer>
            <p>Powered by AlphaZero & ONNX Runtime Web</p>
        </footer>
    </div>
    <script src="game.js?v=2.0.0"></script>
</body>
</html>
